<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>StudySync — Edit Course</title><link rel="stylesheet" href="css/style.css"></head><body>
<nav class="navbar"><a href="index.html" class="logo"><span class="logo-badge">S</span>StudySync</a><div class="navbar-right"><a href="admin-dashboard.html" class="back-link">← Dashboard</a></div></nav>
<div style="max-width:720px;margin:32px auto;padding:0 24px 60px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;"><h1 style="font-size:22px;">Edit Course</h1><button class="btn btn-danger btn-sm">Delete Course</button></div>
  <div class="card">
    <div id="form-banner" class="banner ok"></div>
    <form id="edit-form" novalidate>
      <div class="form-row">
        <div class="field"><label>Course Title</label><input type="text" value="Full Stack Web Development"></div>
        <div class="field"><label>Category</label><select><option selected>Web Development</option><option>Data Science</option><option>Design</option><option>Cloud</option></select></div>
      </div>
      <div class="field"><label>Short Description</label><textarea>Master HTML, CSS, JavaScript, Node.js, and databases.</textarea></div>
      <div class="form-row">
        <div class="field"><label>Instructor Name</label><input type="text" value="Arjun Kumar"></div>
        <div class="field"><label>Level</label><select><option>Beginner</option><option selected>Intermediate</option><option>Advanced</option></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Price (₹)</label><input type="number" value="1999"></div>
        <div class="field"><label>Duration (hours)</label><input type="number" value="24"></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
        <a href="admin-dashboard.html" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
<footer>© 2026 StudySync.</footer>
<script>
document.getElementById('edit-form').addEventListener('submit',function(e){
  e.preventDefault();
  const b=document.getElementById('form-banner');
  b.textContent='✅ Changes saved!';b.className='banner ok show';
  setTimeout(()=>b.classList.remove('show'),2000);
});
</script>
</body></html>
