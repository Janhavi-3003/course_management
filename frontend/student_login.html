<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySync — Student Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo"><span class="logo-badge">S</span>StudySync</a>
  <a href="role.html" class="back-link">← Back</a>
</nav>

<div class="page-center">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-badge">S</div>
      <h2>Student Login</h2>
      <p>Welcome back — continue exploring your courses</p>
    </div>

    <div id="login-banner" class="banner bad"></div>

    <form id="student-login-form" novalidate>
      <div class="field" id="field-email">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="you@school.edu">
        <p class="error-msg">Enter the email you registered with.</p>
      </div>

      <div class="field" id="field-password">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Your password">
        <p class="error-msg">Enter your password.</p>
      </div>

      <button type="submit" class="btn btn-solid btn-block" id="login-submit">Sign In</button>
    </form>

    <p class="form-foot">New here? <a href="student_register.html">Create an account</a></p>
  </div>
</div>

<footer>© 2026 StudySync. Built for students who keep up.</footer>

<script src="script.js"></script>
</body>
</html>
