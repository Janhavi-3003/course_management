<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>StudySync — Forgot Password</title><link rel="stylesheet" href="css/style.css"></head><body>
<nav class="navbar"><a href="index.html" class="logo"><span class="logo-badge">S</span>StudySync</a><a href="student_login.html" class="back-link" style="font-size:13px;">← Sign In</a></nav>
<div class="page-center">
  <div class="auth-card">
    <div class="auth-header"><div class="logo-badge">🔑</div><h2>Forgot Password?</h2><p>Enter your email and we'll send you a reset link</p></div>
    <div id="fp-banner" class="banner ok"></div>
    <form id="fp-form" novalidate>
      <div class="field" id="field-email"><label for="email">Email Address</label><input type="email" id="email" placeholder="you@school.edu"><p class="error-msg">Enter a valid email address.</p></div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <p class="form-foot"><a href="student_login.html">Back to Sign In</a></p>
  </div>
</div>
<footer>© 2026 StudySync.</footer>
<script>
document.getElementById('fp-form').addEventListener('submit',function(e){
  e.preventDefault();
  const email=document.getElementById('email').value;
  const b=document.getElementById('fp-banner');
  if(!email||!email.includes('@')){document.getElementById('field-email').classList.add('has-error');return;}
  b.textContent='✅ Reset link sent to '+email;b.className='banner ok show';
  this.style.display='none';
});
</script>
</body></html>
