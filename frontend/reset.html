<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>StudySync — Reset Password</title><link rel="stylesheet" href="css/style.css"></head><body>
<nav class="navbar"><a href="index.html" class="logo"><span class="logo-badge">S</span>StudySync</a></nav>
<div class="page-center">
  <div class="auth-card">
    <div class="auth-header"><div class="logo-badge">🔒</div><h2>Reset Password</h2><p>Enter your new password below</p></div>
    <div id="rp-banner" class="banner ok"></div>
    <form id="rp-form" novalidate>
      <div class="field" id="field-pw"><label>New Password</label><input type="password" id="newPw" placeholder="At least 8 characters"><p class="error-msg">Password must be at least 8 characters with a number.</p></div>
      <div class="field" id="field-cpw"><label>Confirm New Password</label><input type="password" id="confirmPw" placeholder="Re-enter password"><p class="error-msg">Passwords don't match.</p></div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>
  </div>
</div>
<footer>© 2026 StudySync.</footer>
<script>
document.getElementById('rp-form').addEventListener('submit',function(e){
  e.preventDefault();
  const p=document.getElementById('newPw').value,c=document.getElementById('confirmPw').value;
  let ok=true;
  if(!p||p.length<8||!/\d/.test(p)){document.getElementById('field-pw').classList.add('has-error');ok=false;}else{document.getElementById('field-pw').classList.remove('has-error');}
  if(p!==c){document.getElementById('field-cpw').classList.add('has-error');ok=false;}else{document.getElementById('field-cpw').classList.remove('has-error');}
  if(!ok)return;
  const b=document.getElementById('rp-banner');b.textContent='✅ Password reset! Redirecting to sign in…';b.className='banner ok show';
  setTimeout(()=>window.location.href='student_login.html',1400);
});
</script>
</body></html>
